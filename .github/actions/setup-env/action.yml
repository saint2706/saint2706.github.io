name: "Setup Environment"
description: "Sets up Node.js, pnpm, and installs dependencies with caching"
inputs:
  node-version:
    description: "The Node.js version to use"
    required: false
    default: "20"
runs:
  using: "composite"
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@6e7bdbda5fe05107efc88b23b7ed00aa05f84ca0 # v4
      with:
        version: 10.28.0

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
      with:
        node-version: ${{ inputs.node-version }}
        # Automatically caches dependencies based on pnpm-lock.yaml to speed up pipeline execution
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
