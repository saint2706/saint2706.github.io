name: "Setup Environment"
description: "Sets up Node.js, pnpm, and installs dependencies with caching"
inputs:
  node-version:
    description: "The Node.js version to use"
    required: false
    default: "24"
runs:
  using: "composite"
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@fecec9e040f9e6a8ac07bfed935dc626862cd0c6 # v4.1.0
      with:
        version: 10.28.0

    - name: Setup Node.js
      uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
      with:
        node-version: ${{ inputs.node-version }}
        # Automatically caches dependencies based on pnpm-lock.yaml to speed up pipeline execution
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
