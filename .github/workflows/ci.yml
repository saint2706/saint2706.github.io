name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/setup-env

      - name: Format check
        run: pnpm run format:check

      - name: No-Aura tests
        run: pnpm run test:no-aura

      - name: Lint
        run: pnpm run lint

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/setup-env
        with:
          node-version: ${{ matrix.node-version }}

      - name: Unit tests
        run: pnpm run test:run

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/setup-env

      - name: Build
        run: pnpm run build

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/setup-env

      - name: Security tests
        run: pnpm run test:security

      - name: CSP tests
        run: pnpm run test:csp

      - name: Verify SRI
        run: pnpm run verify:sri

      - name: Python runner stdout tests
        run: pnpm run test:python-runner-stdout

      - name: Pyodide loader retry tests
        run: pnpm run test:pyodide-loader-retry
