name: CodeQL

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: '18 3 * * 1' # Weekly scan on Mondays at 03:18 UTC

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

jobs:
  analyze:
    name: Analyze (JavaScript/TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Keep CodeQL non-blocking while existing baseline issues are triaged.
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@256d634097be96e792d6764f9edaefc4320557b1 # v4
        with:
          languages: javascript-typescript

      # TypeScript extraction benefits from the repo's standard build process.
      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Build
        run: pnpm run build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@256d634097be96e792d6764f9edaefc4320557b1 # v4
